name: Release (multi-platform)

# Tag push qilinganda (masalan: v1.0.0) — 3 platformada yasab
# GitHub Releases sahifasiga avtomatik chiqaradi (brauzerdan yuklab olinadi).
#
# Foydalanish:
#   git tag v1.0.0
#   git push origin v1.0.0
#
# Yoki qo'lda: Actions -> Release -> Run workflow

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (masalan: v1.0.0)'
        required: true
        default: 'v1.0.0'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - run: flutter build windows --release
      - run: dart run msix:create
      - name: Download VC++ Redistributable (MSVCP140 etc.)
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://aka.ms/vs/17/release/vc_redist.x64.exe" -OutFile "windows\installer\vc_redist.x64.exe"
          Get-Item windows\installer\vc_redist.x64.exe
      - name: Inno Setup .exe
        shell: pwsh
        run: |
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) { choco install innosetup -y }
          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" "windows\installer\internet_agent.iss"
      - name: Collect Windows artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist/windows | Out-Null
          $msix = Get-ChildItem -Path . -Recurse -Filter *.msix -ErrorAction SilentlyContinue
          foreach ($f in $msix) { Copy-Item $f.FullName -Destination dist/windows -Force }
          if (Test-Path build/installer) {
            $exe = Get-ChildItem -Path build/installer -Recurse -Filter *.exe -ErrorAction SilentlyContinue
            foreach ($f in $exe) { Copy-Item $f.FullName -Destination dist/windows -Force }
          }
          Write-Host "Collected:"
          Get-ChildItem -Path dist/windows | ForEach-Object { Write-Host "  $($_.Name) ($($_.Length) bytes)" }
      - uses: actions/upload-artifact@v4
        with:
          name: windows-installers
          path: dist/windows/*
          if-no-files-found: error

  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: System deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            ninja-build clang cmake pkg-config \
            libgtk-3-dev libsecret-1-dev libjsoncpp-dev \
            libayatana-appindicator3-dev rpm dpkg-dev fakeroot
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - run: flutter build linux --release
      - run: bash installer/linux/deb/build_deb.sh
      - run: bash installer/linux/rpm/build_rpm.sh
      - name: appimagetool
        run: |
          wget -q https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool-x86_64.AppImage
          sudo mv appimagetool-x86_64.AppImage /usr/local/bin/appimagetool
      - run: APPIMAGE_EXTRACT_AND_RUN=1 bash installer/linux/appimage/build_appimage.sh
      - run: bash installer/linux/build_tarball.sh
      - uses: actions/upload-artifact@v4
        with:
          name: linux-installers
          path: |
            build/installer/*.deb
            build/installer/*.rpm
            build/installer/*.AppImage
            build/installer/*.tar.gz

  publish:
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten artifacts
        run: |
          mkdir -p release
          find artifacts -type f \( \
            -name '*.msix' -o -name '*.exe' \
            -o -name '*.dmg' -o -name '*.pkg' \
            -o -name '*.deb' -o -name '*.rpm' \
            -o -name '*.AppImage' -o -name '*.tar.gz' \
            \) -exec cp -v {} release/ \;
          ls -lh release/

      - name: Determine tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${GITHUB_REF##*/}" >> "$GITHUB_OUTPUT"
          fi

      - name: GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.value }}
          name: Internet Monitoring Agent ${{ steps.tag.outputs.value }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            release/*
          body: |
            ## Internet Monitoring Agent ${{ steps.tag.outputs.value }}

            **Yuklab olish (brauzerdan):**

            ### Windows
            - `InternetMonitoringAgent_Setup_*.exe` — klassik installer (Inno Setup)
            - `internet.msix` — Microsoft Store paketi

            ### Linux
            - `internet-monitoring-agent_*.deb` — Debian/Ubuntu (`sudo dpkg -i`)
            - `internet-monitoring-agent-*.rpm` — Fedora/RHEL (`sudo dnf install`)
            - `InternetMonitoringAgent-*.AppImage` — har qaysi distroda ishlaydi (chmod +x va run)
            - `internet-monitoring-agent-*-linux-x64.tar.gz` — manual o'rnatish

            **Birinchi ishga tushganda** agent kalitini (X-Agent-Key) kiriting. Kalitni admin paneldan oling: https://e-mmtb.uz/
