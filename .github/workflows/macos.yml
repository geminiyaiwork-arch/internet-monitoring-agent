name: Build macOS

on:
  workflow_dispatch:
  push:
    branches: [main, master]
    paths-ignore:
      - '**.md'
      - 'installer/linux/**'
      - 'windows/installer/**'
  workflow_call:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Pub get
        run: flutter pub get

      - name: Build macOS release
        run: flutter build macos --release

      - name: Build DMG
        run: bash installer/macos/build_dmg.sh

      - name: Build PKG
        run: bash installer/macos/build_pkg.sh

      - name: Upload macOS installers
        uses: actions/upload-artifact@v4
        with:
          name: macos-installers
          path: |
            build/installer/*.dmg
            build/installer/*.pkg
          if-no-files-found: error
