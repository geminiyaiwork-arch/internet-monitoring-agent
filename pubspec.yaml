name: internet
description: Internet Monitoring Agent — ruxsatli ta'lim monitoring agenti (Windows, Linux).
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.4.3 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  dio: ^5.7.0
  sqflite_common_ffi: 2.3.3
  sqflite_common: 2.5.4
  # sqlite3.dll'ni Windows build'iga avtomatik qo'shadi.
  # Busiz internet.exe yonida sqlite3.dll bo'lmaydi va app crash bo'ladi.
  sqlite3_flutter_libs: ^0.5.24
  path: ^1.9.0
  path_provider: ^2.1.5
  flutter_secure_storage: ^9.2.2
  intl: ^0.19.0
  uuid: ^3.0.7
  equatable: ^2.0.7
  connectivity_plus: ^6.1.0
  network_info_plus: ^6.0.1
  system_tray: ^2.0.3
  launch_at_startup: ^0.3.1
  window_manager: ^0.4.2
  crypto: ^3.0.6
  package_info_plus: ^8.0.0
  # Windows-only — boshqa platformalarda tushiriladi, lekin pubspec'da har doim ko'rinadi.
  win32: '>=5.4.0 <5.5.5'
  ffi: ^2.1.3
  # Screen capture (Windows + Linux + macOS) — JPEG ekran rasm olish.
  screen_capturer: ^0.2.3
  # PNG -> JPEG konvertatsiya va sifat nazorati.
  image: ^4.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  msix: ^3.16.13

flutter:
  uses-material-design: true
  assets:
    - assets/branding/app_logo.png

# Windows MSIX o'rnatuvchi: `dart run msix:create` (faqat Windowsda).
msix_config:
  display_name: Internet Monitoring Agent
  publisher_display_name: E-MMTB
  publisher: CN=E-MMTB, O=E-MMTB, C=UZ
  identity_name: uz.emmtb.internetmonitoringagent
  msix_version: 1.0.0.1
  logo_path: assets/branding/app_logo.png
  capabilities: internetClient
  architecture: x64
  sign_msix: false
  install_certificate: false
  build_windows: false
